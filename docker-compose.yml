services:
  clash:
    image: ghcr.nju.edu.cn/bctjo/docker-clash:latest
    container_name: clash
    restart: unless-stopped
    volumes:
      - ./data:/root/.config/clash
    ports:
      - "9090:9090" # Portal
      - "9097:9097" # Dashboard
      - "7890:7890" # HTTP
      - "7891:7891" # SOCKS5
      - "7892:7892" # TPROXY
      - "7893:7893" # MIXED
    networks:
      - clash_net
    environment:
      PORTAL_ADMIN_KEY: "your_password"       # Portal 基础认证密码（注释则不启用）
      GEODATA_AUTO_UPDATE: "true"   # Geodata 自动更新（首启下载失败/超时会自动熔断本次运行）
      # PORTAL_PORT: "9090"        # Portal 端口（默认 9090）
      # DASH_PORT: "9097"          # Clash external-controller 端口（默认 9097）
      # CLASH_HTTP_PORT: "7890"    # HTTP 代理端口（默认 7890）
      # CLASH_SOCKS_PORT: "7891"   # SOCKS5 代理端口（默认 7891）
      # CLASH_TPROXY_PORT: "7892"  # TPROXY 端口（默认 7892）
      # CLASH_MIXED_PORT: "7893"   # MIXED 端口（默认 7893）
      # SUBSCR_VALIDATE_MAX_TIME: "120" # 导入订阅校验下载超时（秒）
      # SUBSCR_DOWNLOAD_MAX_TIME: "120" # 更新订阅下载超时（秒）
      # SUBSCR_CONNECT_TIMEOUT: "15"    # 订阅下载连接超时（秒）

networks:
  clash_net:
    driver: bridge
    enable_ipv6: false
