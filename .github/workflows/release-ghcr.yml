name: Release And Publish GHCR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (default: manual-<shortsha>)"
        required: false
        type: string
      push_latest:
        description: "Also push :latest tag"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version tag
        id: vars
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            push_latest="true"
          else
            version="${{ inputs.image_tag }}"
            if [[ -z "$version" ]]; then
              version="manual-${GITHUB_SHA::7}"
            fi
            push_latest="${{ inputs.push_latest }}"
          fi

          tags="${IMAGE_NAME}:${version}"
          if [[ "$push_latest" == "true" ]]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
          fi

          {
            echo "version=${version}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download mihomo cores (official GitHub)
        run: |
          set -euo pipefail
          tag="$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | sed -n 's/^[[:space:]]*\"tag_name\": \"\([^\"]*\)\",/\1/p' | head -n1)"
          if [[ -z "${tag}" || "${tag}" == "null" ]]; then
            echo "Failed to resolve mihomo release tag" >&2
            exit 1
          fi

          mkdir -p core
          curl -fL "https://github.com/MetaCubeX/mihomo/releases/download/${tag}/mihomo-linux-amd64-compatible-${tag}.gz" -o /tmp/mihomo-linux-amd64.gz
          curl -fL "https://github.com/MetaCubeX/mihomo/releases/download/${tag}/mihomo-linux-arm64-${tag}.gz" -o /tmp/mihomo-linux-arm64.gz
          gunzip -c /tmp/mihomo-linux-amd64.gz > core/clash-linux-amd64
          gunzip -c /tmp/mihomo-linux-arm64.gz > core/clash-linux-arm64
          chmod +x core/clash-linux-amd64 core/clash-linux-arm64
          file core/clash-linux-amd64 core/clash-linux-arm64

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.vars.outputs.version }}
            APP_REVISION=${{ github.sha }}
            APP_SOURCE=${{ github.server_url }}/${{ github.repository }}
          tags: ${{ steps.vars.outputs.tags }}

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: docker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source archive
        run: |
          git archive --format=tar.gz --output "docker-clash-${GITHUB_REF_NAME}.tar.gz" "${GITHUB_SHA}"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: false
          body: |
            请手动补充本版本更新日志。
          files: |
            docker-clash-${{ github.ref_name }}.tar.gz
